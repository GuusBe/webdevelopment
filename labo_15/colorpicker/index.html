<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Color Picker</title>

</head>
<body>

<div class="container">
    <div style="border: 2px solid #ccc; border-radius: 10px; padding: 20px; display: inline-flex; align-items: center; gap: 30px; font-family: Arial;">

        <div class="sliders">
            <div style="margin-bottom: 10px;">
                <span>0</span>
                <input type="range" id="r" min="0" max="255" value="212" oninput="update()">
                <span>255</span>
                <label>Red <span id="r-val">212</span></label>
            </div>

            <div style="margin-bottom: 10px;">
                <span>0</span>
                <input type="range" id="g" min="0" max="255" value="97" oninput="update()">
                <span>255</span>
                <label>Green <span id="g-val">97</span></label>
            </div>

            <div style="margin-bottom: 10px;">
                <span>0</span>
                <input type="range" id="b" min="0" max="255" value="196" oninput="update()">
                <span>255</span>
                <label>Blue <span id="b-val">196</span></label>
            </div>
        </div>

        <div id="kleur-vak" style="width: 100px; height: 80px; border: 1px solid #000; border-radius: 5px; background-color: rgb(212, 97, 196);">
        </div>

    </div>

<script src="javascript/script.js"></script>
</body>
</html>z
